volumes:
  pg_data:


services:
  db:
    image: postgres:15
    restart: always
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - db
    ports:
      - "80:80"
